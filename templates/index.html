<!DOCTYPE html>
<html>

<head>

<title>SmartExamAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:30px;
}

.questionBox{
margin-bottom:25px;
padding:15px;
border:1px solid #ddd;
border-radius:8px;
}

.correct{
color:green;
font-weight:bold;
font-size:18px;
}

.wrong{
color:red;
font-weight:bold;
font-size:18px;
}

button{
padding:10px 16px;
margin:5px;
cursor:pointer;
border:none;
background:#2c7be5;
color:white;
border-radius:5px;
}

button:hover{
background:#1a5fd1;
}

textarea{
width:100%;
height:100px;
padding:10px;
}

.option{
margin-left:15px;
}

.keyword{
background:#e8f5e9;
padding:4px 8px;
border-radius:5px;
margin:3px;
display:inline-block;
}

</style>

</head>

<body>

<h2>Upload Notes PDF</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="file" required><br><br>

<label>MCQ:</label>
<input type="number" name="mcqCount" value="2"><br><br>

<label>2 Mark Questions:</label>
<input type="number" name="twoMarkCount" value="2"><br><br>

<select name="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<br><br>

<button type="submit">Generate Questions</button>

</form>

<hr>

{% if question_list and question_list|length > 0 %}

<h3>Generated Questions</h3>

<div id="questionPreview">

{% for q in question_list %}
<div class="questionBox">
<b>Question {{loop.index}}</b>
<p style="white-space:pre-line">{{q}}</p>
</div>
{% endfor %}

</div>

<button onclick="startExam()">Start Exam</button>

<hr>

<div id="examArea"></div>

{% endif %}

<script>

let questions = {{ question_list | tojson | safe }};
let answers = new Array(questions.length).fill("");

let current = 0;
let recognition;

function speak(text){

let speech = new SpeechSynthesisUtterance(text)
speech.rate = 0.9
speech.lang="en-US"

speechSynthesis.cancel()
speechSynthesis.speak(speech)

}

function startExam(){

current=0
showQuestion()

}

function showQuestion(){

if(current>=questions.length){

document.getElementById("examArea").innerHTML=

`
<h2>Exam Completed</h2>
<button onclick="finishExam()">Submit Exam</button>
`

return
}

let q = questions[current]

document.getElementById("examArea").innerHTML=

`
<div class="questionBox">

<h3>Question ${current+1}</h3>

<p style="white-space:pre-line">${q}</p>

<textarea id="answerBox"></textarea>

<br>

<button onclick="repeatQuestion()">Repeat Question</button>
<button onclick="startAnswer()">Start Answer</button>
<button onclick="stopAnswer()">Stop Answer</button>
<button onclick="nextQuestion()">Next Question</button>

</div>
`

speak("Question "+(current+1))

setTimeout(()=>{
speak(q)
},1000)

}

function repeatQuestion(){

speak(questions[current])

}

function startAnswer(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

recognition = new SpeechRecognition()

recognition.continuous=true
recognition.interimResults=false
recognition.lang="en-US"

recognition.onresult=function(event){

let text=event.results[event.results.length-1][0].transcript

let box=document.getElementById("answerBox")

box.value+=text+" "

}

recognition.start()

}

function stopAnswer(){

if(recognition){
recognition.stop()
}

answers[current]=document.getElementById("answerBox").value

}

function nextQuestion(){

answers[current]=document.getElementById("answerBox").value

current++

showQuestion()

}

function finishExam(){

fetch("/evaluate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
questions:questions,
answers:answers
})

})

.then(res=>res.json())

.then(data=>{

let html="<h2>Exam Result</h2>"

html+=`<h3>Score: ${data.percentage}%</h3>`

html+=`<button onclick="showCorrections()">View Corrections</button>`

html+=`<div id="correctionArea" style="display:none"></div>`

document.getElementById("examArea").innerHTML=html

window.resultData=data

})

}

function showCorrections(){

let data=window.resultData

let html=""

data.results.forEach((r)=>{

html+=`<div class="questionBox">`

html+=`<h3>Question ${r.question}</h3>`

html+=`<p><b>Your Answer:</b> ${r.student_answer}</p>`

if(r.keywords){

html+=`<p><b>Keywords Expected:</b></p>`

r.keywords.forEach(k=>{
html+=`<span class="keyword">${k}</span>`
})

html+=`<br><br>`

html+=`<p><b>Keywords Found:</b> ${r.keyword_match}</p>`

html+=`<p><b>Marks Awarded:</b> ${r.marks}/2</p>`

}

if(r.correct){

html+=`<p class="correct">✔ Correct</p>`

}else{

html+=`<p class="wrong">❌ Wrong</p>`

html+=`<p class="correct"><b>Correct Answer:</b> ${r.correct_answer}</p>`

}

html+=`</div>`

})

document.getElementById("correctionArea").innerHTML=html

document.getElementById("correctionArea").style.display="block"

}

</script>

</body>

</html>
